          type: array
          items:
            $ref: "#/components/schemas/User"

    DeleteResult:
      type: object
      properties:
        deleted:
          type: boolean
          example: true

    SuccessDeleteUserResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "User deleted successfully"
        data:
          $ref: "#/components/schemas/DeleteResult"

    UpdateRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          type: string
          description: New role value
          example: admin

    UpdateUserRequest:
      type: object
      description: Partial user update payload (fields depend on your users table)
      additionalProperties: true
      example:
        full_name: "John Doe"
        phone: "+919999999999"