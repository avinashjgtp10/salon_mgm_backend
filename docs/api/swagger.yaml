        password:
          type: string
          example: "Password@123"
        fullName:
          type: string
          example: "John Doe"
        phone:
          type: string
          nullable: true
        businessName:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        countryCode:
          type: string
          nullable: true
        terms:
          type: boolean
          example: true

